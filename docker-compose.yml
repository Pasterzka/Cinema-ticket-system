services:
  postgres:
    image: postgres:18
    container_name: cinequeue-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: CineQueueDb
    ports:
      - "5432:5432"
    volumes:
      - cinequeue-db-data:/var/lib/postgresql
    restart: unless-stopped

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - 8080:8080

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: cinequeue-mq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"       # .NET Communication
      - "15672:15672"     # Management UI
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: WebAPI/Dockerfile
    container_name: cinequeue-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=CineQueueDb;Username=admin;Password=admin
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=admin
      - RabbitMQ__Password=admin
    ports:
      - "5050:8080"
    depends_on:
      - postgres
      - rabbitmq
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Worker/Dockerfile
    container_name: cinequeue-worker
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=CineQueueDb;Username=admin;Password=admin
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=admin
      - RabbitMQ__Password=admin
    depends_on:
      - postgres
      - rabbitmq
    restart: unless-stopped

  web:
    build:
      context: ./Web
      dockerfile: Dockerfile
    container_name: cinequeue-web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  cinequeue-db-data: